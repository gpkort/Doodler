[System]
log_level = INFO    
log_file = doodler.log

[Display]
height = 800
width = 480
orientation = 90
use_local_display = True

[Fonts]
windows_font_path = C:\Windows\Fonts\
linux_font_path = /usr/share/fonts/truetype/dejavu/
windows_font_name = Arial.ttf
linux_font_name = DejaVuSans.ttf
small_font_size = 18
medium_font_size = 24
large_font_size = 36

[Icons]
icon_dir = assets/icons/
home_icon_path = home.png
settings_icon_path = settings.png
audiobook_icon_path = audiobook.png
ereader_icon_path = ereader.png
